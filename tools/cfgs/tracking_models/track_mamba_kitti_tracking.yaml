CLASS_NAMES: ['Car', 'Pedestrian', 'Cyclist']

DATA_CONFIG:
    ROOT_DIR: '/media/lx/LY/Roadside/V2X-Seq-train_val/kitti_tracking'
    TRAIN_CACHE_DIR: '/media/lx/LY/Roadside/V2X-Seq-train_val/kitti_tracking/cache/train_cache'
    VAL_CACHE_DIR: '/media/lx/LY/Roadside/V2X-Seq-train_val/kitti_tracking/cache/val_cache'
    CACHE_DIR: '/media/lx/LY/Roadside/V2X-Seq-train_val/kitti_tracking/cache/val_cache'
    INFO_PATH: {
        'train': [tracking_infos_train.pkl],
        'test': [tracking_infos_val.pkl],
    }
    HISTORY_LEN: 8
    DET_GT_MATCH_IOU: 0.1
    MIN_TRACK_HISTORY: 1
    DEGRADED_QUALITY_THRESH: 0.45
    RECOVERY_LOOKBACK: 3
    SURVIVAL_LOOKAHEAD: 3

MODEL:
    NAME: TrackMamba
    GEOM_DIM: 8
    QUALITY_DIM: 7
    TIME_DIM: 4
    CONTEXT_DIM: 4
    HIDDEN_DIM: 128
    NUM_BLOCKS: 2
    DROPOUT: 0.1
    POS_WEIGHT: 6.0
    ASSOC_WEIGHT: 1.0
    MOTION_WEIGHT: 0.4

TRACKER:
    MAX_AGE: 3
    MIN_HITS: 2
    MATCH_THRESHOLD: 0.5
    RECOVERY_MATCH_THRESHOLD: 0.6
    HIGH_QUALITY_THRESH: 0.3
    LOW_QUALITY_THRESH: 0.1
    ALLOW_LOW_QUALITY_BIRTH: False
    ASSOC_IOU_GATE: 0.01
    ASSOC_CENTER_DIST: 8.0
    RECOVERY_ASSOC_IOU_GATE: 0.01
    RECOVERY_ASSOC_CENTER_DIST: 4.0

EVAL:
    IOU_THRESHOLD: 0.1

OPTIMIZATION:
    BATCH_SIZE_PER_GPU: 4
    NUM_EPOCHS: 20
    LR: 0.001
    WEIGHT_DECAY: 0.0001
    LR_STEP: 8
    LR_GAMMA: 0.5
