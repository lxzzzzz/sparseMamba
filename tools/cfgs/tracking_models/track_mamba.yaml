CLASS_NAMES: ['Car', 'Pedestrian', 'Cyclist']

DATA_CONFIG:
    ROOT_DIR: '/root/sparseMamba/data/dair_v2x_tracking'
    CACHE_DIR: '/root/sparseMamba/data/dair_v2x_tracking/cache/fusion_voxelnext_200m'
    INFO_PATH: {
        'train': [tracking_infos_train.pkl],
        'test': [tracking_infos_val.pkl],
    }
    HISTORY_LEN: 8
    DET_GT_MATCH_IOU: 0.1
    MIN_TRACK_HISTORY: 1
    DEGRADED_QUALITY_THRESH: 0.45
    RECOVERY_LOOKBACK: 3
    SURVIVAL_LOOKAHEAD: 3

MODEL:
    NAME: TrackMamba
    GEOM_DIM: 8
    QUALITY_DIM: 7
    TIME_DIM: 4
    CONTEXT_DIM: 4
    HIDDEN_DIM: 128
    NUM_BLOCKS: 2
    DROPOUT: 0.1
    POS_WEIGHT: 6.0
    ASSOC_WEIGHT: 1.0
    RECOVERY_WEIGHT: 0.5
    SURVIVAL_WEIGHT: 0.3
    MOTION_WEIGHT: 0.4

TRACKER:
    MAX_AGE: 3
    MAX_AGE_RECOVERING: 5
    MIN_HITS: 2
    MATCH_THRESHOLD: 0.5
    NEW_TRACK_SCORE_THRESH: 0.3
    ASSOC_IOU_GATE: 0.01
    ASSOC_CENTER_DIST: 8.0
    SURVIVAL_THRESHOLD: 0.45

EVAL:
    IOU_THRESHOLD: 0.1

OPTIMIZATION:
    BATCH_SIZE_PER_GPU: 4
    NUM_EPOCHS: 20
    LR: 0.001
    WEIGHT_DECAY: 0.0001
    LR_STEP: 8
    LR_GAMMA: 0.5
