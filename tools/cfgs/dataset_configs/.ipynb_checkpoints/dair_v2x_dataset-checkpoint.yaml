DATASET: 'KittiDataset'
DATA_PATH: '/root/sparseMamba/data/dair_v2x' # 你的数据路径

# --- 关键修改点 1: 针对路侧感知的范围 ---
# 路侧通常覆盖范围大，且 Z 轴向下（相机安装高）
POINT_CLOUD_RANGE: [0, -46.08, -3, 204.8, 46.08, 1]

DATA_SPLIT: {
    'train': train,
    'test': val
}

INFO_PATH: {
    'train': [dair_v2x_infos_train.pkl],
    'test': [dair_v2x_infos_val.pkl],
}

# --- 关键修改点 2: 开启图像加载 ---
# 创新点 2 需要图像做融合
GET_ITEM_LIST: ["points", "images", "calib_matrices"] 
FOV_POINTS_ONLY: False # 不要只取落在图像内的点，因为路侧可能有盲区

DATA_AUGMENTOR:
    DISABLE_AUG_LIST: ['placeholder']
    AUG_CONFIG_LIST:
        # - NAME: gt_sampling
        #   USE_ROAD_PLANE: False # 路侧通常不需要地面平面拟合
        #   DB_INFO_PATH:
        #       - dair_v2x_dbinfos_train.pkl
        #   PREPARE: {
        #      filter_by_min_points: ['Car:5', 'Pedestrian:5', 'Cyclist:5'],
        #      filter_by_difficulty: [-1],
        #   }
        #   SAMPLE_GROUPS: ['Car:15','Pedestrian:10', 'Cyclist:10']
        #   NUM_POINT_FEATURES: 4
        #   REMOVE_EXTRA_WIDTH: [0.0, 0.0, 0.0]
        #   LIMIT_WHOLE_SCENE: True

        - NAME: random_world_flip
          ALONG_AXIS_LIST: ['x']

        - NAME: random_world_rotation
          WORLD_ROT_ANGLE: [-0.78539816, 0.78539816]

        - NAME: random_world_scaling
          WORLD_SCALE_RANGE: [0.95, 1.05]

POINT_FEATURE_ENCODING: {
    encoding_type: absolute_coordinates_encoding,
    used_feature_list: ['x', 'y', 'z', 'intensity'],
    src_feature_list: ['x', 'y', 'z', 'intensity'],
}

DATA_PROCESSOR:
    - NAME: mask_points_and_boxes_outside_range
      REMOVE_OUTSIDE_BOXES: True

    - NAME: shuffle_points
      SHUFFLE_ENABLED: {
        'train': True,
        'test': False
      }

    - NAME: transform_points_to_voxels
      # 这里的 VOXEL_SIZE 必须配合 Mamba 的设计
      VOXEL_SIZE: [0.16, 0.16, 0.1] 
      MAX_POINTS_PER_VOXEL: 5
      MAX_NUMBER_OF_VOXELS: {
        'train': 150000, # 路侧点多，调大一点
        'test': 150000
      }