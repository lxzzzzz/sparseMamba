DATASET: 'KittiTrackingFrameDataset'
DATA_PATH: 'data/v2x_xian'

POINT_CLOUD_RANGE: [0, -20, -4.5, 120, 30, 10.5]

DEFAULT_CLASS_NAME: 'Car'

DATA_SPLIT: {
    'train': train,
    'test': val
}

INFO_PATH: {
    'train': [tracking_infos_train.pkl],
    'test': [tracking_infos_val.pkl],
}

GET_ITEM_LIST: ['points', 'images', 'calib_matrices']
FOV_POINTS_ONLY: False

POINT_FEATURE_ENCODING: {
    encoding_type: absolute_coordinates_encoding,
    used_feature_list: ['x', 'y', 'z', 'intensity'],
    src_feature_list: ['x', 'y', 'z', 'intensity'],
}

DATA_PROCESSOR:
    - NAME: mask_points_and_boxes_outside_range
      REMOVE_OUTSIDE_BOXES: False

    - NAME: shuffle_points
      SHUFFLE_ENABLED: {
        'train': False,
        'test': False
      }

    - NAME: transform_points_to_voxels
      VOXEL_SIZE: [0.16, 0.16, 0.1]
      MAX_POINTS_PER_VOXEL: 5
      MAX_NUMBER_OF_VOXELS: {
        'train': 150000,
        'test': 150000
      }
